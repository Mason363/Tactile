<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tactile bridge test page</title>
  <style>
    body { font: 16px -apple-system, system-ui, sans-serif; margin: 40px; max-width: 640px; color: #111; }
    h1 { font-size: 20px; }
    .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; margin: 18px 0; }
    /* The whole reason the extension exists: a clickable with NO role and NO
       semantic tag - invisible to the accessibility tree, felt only via DOM. */
    .divbtn { padding: 10px 18px; background: #2563eb; color: #fff; border-radius: 8px;
              cursor: pointer; user-select: none; }
    .plaindiv { padding: 10px 18px; background: #eee; border-radius: 8px; }
    button, a { font-size: 16px; }
    .note { color: #666; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Tactile bridge test page</h1>

  <div class="row">
    <div class="divbtn" onclick="this.textContent='clicked'">Div button (cursor:pointer, no role)</div>
    <span class="note">← accessibility-invisible; should still tick</span>
  </div>

  <div class="row">
    <div class="plaindiv">Plain div (not clickable)</div>
    <span class="note">← should stay silent</span>
  </div>

  <div class="row">
    <button type="button">Real &lt;button&gt;</button>
    <a href="#link">A hyperlink</a>
    <label><input type="checkbox" /> Checkbox</label>
    <input type="text" placeholder="Text field" />
  </div>

  <div class="row">
    <div class="divbtn" role="button" aria-label="Delete account">🗑 Delete</div>
    <span class="note">← danger waveform</span>
  </div>

  <div class="row">
    <div class="divbtn" role="switch" aria-checked="true">Switch (on)</div>
    <span class="note">← toggle + state pulse</span>
  </div>

  <div class="row">
    <button type="button" disabled>Disabled button</button>
    <span class="note">← feel-disabled (if enabled) or silence</span>
  </div>
</body>
</html>
